<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akshay Mahajan | AI Architect & Prompt Engineer</title>
    <meta name="description" content="Portfolio of Akshay Mahajan" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              midnight: '#050a14',
              ink: '#050a14',
              electric: '#00f5d4',
              plasma: '#00f5d4',
              neonLime: '#f0ff44',
              volt: '#f0ff44',
              ghost: 'rgba(255,255,255,0.06)'
            },
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
              display: ['Syne', 'sans-serif']
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite'
            },
            keyframes: {
              float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-16px)' } }
            }
          }
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        background-color: #050a14;
        color: #e2e8f0;
      }
      /* Custom grid bg seen in previous version */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(0,245,212,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,245,212,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
