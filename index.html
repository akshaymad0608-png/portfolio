    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              midnight: '#050a14',
              ink: '#050a14',
              electric: '#00f5d4',
              plasma: '#00f5d4',
              neonLime: '#f0ff44',
              volt: '#f0ff44',
              ghost: 'rgba(255,255,255,0.06)'
            },
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
              display: ['Syne', 'sans-serif']

            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite'
            },
            keyframes: {
              float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-16px)' } }
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        overflow-x: hidden;
        width: 100%;
        position: relative;
      }
      body {
        margin: 0;
        background-color: #050a14;
        color: #e2e8f0;
      }
      /* Custom grid bg seen in previous version */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(0,245,212,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,245,212,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }
      
      /* Cyber-Light Theme */
      html.light-mode body {
        filter: invert(1) hue-rotate(180deg);
      }
      
      html.light-mode img, 
      html.light-mode video {
        filter: invert(1) hue-rotate(180deg);
      }
      
      /* Fix for project preview images */
      .project-preview img {
        opacity: 1 !important;
        filter: none !important;
      }
      html.light-mode .project-preview img {
        filter: invert(1) hue-rotate(180deg) !important;
      }
      
      .project-preview::before,
      .project-preview::after {
        display: none !important;
      }
      
      .hide-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
  </head>
