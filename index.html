    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2563EB',
              background: '#FFFFFF',
              section: '#F8FAFC',
              cards: '#FFFFFF',
              border: '#E5E7EB',
              text: '#111827',
              textSecondary: '#6B7280',
              success: '#22C55E',
              midnight: '#FFFFFF', /* for backwards compat, though we should remove usages */
              electric: '#2563EB', /* for backwards compat */
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Inter', 'sans-serif'] /* user wants simple modern font, we can use Inter for everything or keep Space Grotesk if we want */
            },
          }
        }
      }
    </script>
    <style>
      html, body {
        overflow-x: hidden;
        width: 100%;
        min-height: 100vh;
        position: relative;
        background-color: #FFFFFF;
        color: #111827;
      }
      .hide-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
