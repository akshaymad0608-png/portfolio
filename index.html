<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y47704N52H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-Y47704N52H');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="OKrQe1gmGTch6hUqiREhg5pnE1uW6vlGTyEXHYm3b38" />
    
    <!-- Primary Meta Tags -->
    <meta name="author" content="Akshay Mahajan" />

    <!-- Open Graph & Twitter handled by react-helmet-async in SEO.tsx -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#F8FAFC',
              section: '#FFFFFF',
              cards: '#FFFFFF',
              glass: 'rgba(255, 255, 255, 0.7)',
              primary: '#4F46E5',
              secondary: '#7C3AED',
              accent: '#16A34A',
              border: 'rgba(15, 23, 42, 0.1)',
              text: '#0F172A',
              textSecondary: '#475569',
              muted: '#94A3B8',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Manrope', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      html, body {
        overflow-x: hidden;
        width: 100%;
        min-height: 100vh;
        position: relative;
        background-color: #F8FAFC;
        color: #0F172A;
      }


      .hide-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Manrope', sans-serif;
      }
      
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-delay: -1ms !important;
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          background-attachment: initial !important;
          scroll-behavior: auto !important;
          transition-duration: 0s !important;
          transition-delay: 0s !important;
        }
      }

      /* Base glass effect */
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(15, 23, 42, 0.1);
      }
      
      .glass-card {
        background: #FFFFFF;
        border: 1px solid rgba(15, 23, 42, 0.1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }

      .glass-card:hover {
         transform: translateY(-2px);
         box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-image: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
